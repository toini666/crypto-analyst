<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0B0D11;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="30"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="el-01-hook"
        class="scene"
        data-composition-id="01-hook"
        data-composition-src="compositions/frames/01-hook.html"
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
      ></div>

      <div
        id="el-02-pain"
        class="scene"
        data-composition-id="02-pain"
        data-composition-src="compositions/frames/02-pain.html"
        data-start="4"
        data-duration="4.4"
        data-track-index="1"
      ></div>

      <div
        id="el-03-method"
        class="scene"
        data-composition-id="03-method"
        data-composition-src="compositions/frames/03-method.html"
        data-start="8"
        data-duration="6"
        data-track-index="0"
      ></div>

      <div
        id="el-04-verdict"
        class="scene"
        data-composition-id="04-verdict"
        data-composition-src="compositions/frames/04-verdict.html"
        data-start="13.5"
        data-duration="7"
        data-track-index="1"
      ></div>

      <div
        id="el-05-pillars"
        class="scene"
        data-composition-id="05-pillars"
        data-composition-src="compositions/frames/05-pillars.html"
        data-start="20"
        data-duration="5.9"
        data-track-index="0"
      ></div>

      <div
        id="el-06-cta"
        class="scene"
        data-composition-id="06-cta"
        data-composition-src="compositions/frames/06-cta.html"
        data-start="25.5"
        data-duration="4.5"
        data-track-index="1"
      ></div>

      <!-- BGM -->
      <audio
        id="el-bgm"
        src="assets/bgm/track.mp3"
        data-start="0"
        data-duration="30"
        data-track-index="11"
        data-volume="0.9"
      ></audio>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-hook", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 4);
        tl.fromTo("#el-02-pain", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 4);
        tl.to("#el-02-pain", { scale: 2.5, opacity: 0, filter: "blur(8px)", duration: 0.4, ease: "power3.in" }, 8);
        tl.fromTo("#el-03-method", { scale: 0.5, opacity: 0, filter: "blur(8px)" }, { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.4, ease: "power3.out" }, 8);
        tl.to("#el-03-method", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 13.5);
        tl.fromTo("#el-04-verdict", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 13.5);
        tl.to("#el-04-verdict", { y: -1080, duration: 0.5, ease: "power3.inOut" }, 20);
        tl.fromTo("#el-05-pillars", { y: 1080, opacity: 1 }, { y: 0, duration: 0.5, ease: "power3.inOut" }, 20);
        tl.to("#el-05-pillars", { scale: 2.5, opacity: 0, filter: "blur(8px)", duration: 0.4, ease: "power3.in" }, 25.5);
        tl.fromTo("#el-06-cta", { scale: 0.5, opacity: 0, filter: "blur(8px)" }, { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.4, ease: "power3.out" }, 25.5);
        tl.to({}, { duration: 30 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
