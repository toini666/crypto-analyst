    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ── Scene 1 (0.0–1.2s): eyebrow + empty tracks stack in top→bottom ──
      tl.fromTo(
        "#p05-eyebrow",
        { opacity: 0, y: -14 },
        { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" },
        0,
      );

      // each row (label + empty track) reveals in a fast staggered cascade
      tl.fromTo(
        ".p05-row",
        { opacity: 0, y: 24 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power3.out", stagger: 0.1 },
        0.2,
      );

      // ── Scene 2 (1.2–4.3s): each bar fills + its value counts up, paced ──
      const BARS = [
        { fill: "#p05-fill-0", val: "p05-val-0", target: 80 },
        { fill: "#p05-fill-1", val: "p05-val-1", target: 68 },
        { fill: "#p05-fill-2", val: "p05-val-2", target: 63 },
        { fill: "#p05-fill-3", val: "p05-val-3", target: 57 },
        { fill: "#p05-fill-4", val: "p05-val-4", target: 57 },
        { fill: "#p05-fill-5", val: "p05-val-5", target: 49 },
      ];

      const FILL_START = 1.3;
      const FILL_GAP = 0.45;
      const FILL_DUR = 0.8;

      BARS.forEach((bar, i) => {
        const at = FILL_START + i * FILL_GAP;
        const valEl = document.getElementById(bar.val);

        // bar fills to its score (track represents 0–100)
        tl.fromTo(
          bar.fill,
          { scaleX: 0 },
          { scaleX: bar.target / 100, duration: FILL_DUR, ease: "power3.out" },
          at,
        );

        // value fades in as the fill begins
        tl.fromTo(
          "#" + bar.val,
          { opacity: 0 },
          { opacity: 1, duration: 0.3, ease: "power2.out" },
          at,
        );

        // value counts up, landing with the fill (shared ease + duration)
        const proxy = { v: 0 };
        tl.to(
          proxy,
          {
            v: bar.target,
            duration: FILL_DUR,
            ease: "power3.out",
            onUpdate: () => {
              valEl.textContent = Math.round(proxy.v);
            },
          },
          at,
        );
      });

      // ── Scene 3 (4.3–5.5s): bottom red-flag strip reveals, then hold ──
      tl.fromTo(
        "#p05-strip",
        { opacity: 0, y: 16 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" },
        4.4,
      );

      window.__timelines["05-pillars"] = tl;
    </script>
