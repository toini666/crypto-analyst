<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata for the source file only; the HF runtime ignores it -->
  </head>
  <body>
    <template>
      <style>
        @font-face{font-family:'IBM Plex Sans';font-style:normal;font-weight:400;font-display:block;src:url('assets/fonts/plex-sans-400.woff2') format('woff2');}
        @font-face{font-family:'IBM Plex Sans';font-style:normal;font-weight:600;font-display:block;src:url('assets/fonts/plex-sans-600.woff2') format('woff2');}
        @font-face{font-family:'IBM Plex Sans';font-style:normal;font-weight:700;font-display:block;src:url('assets/fonts/plex-sans-700.woff2') format('woff2');}
        @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:400;font-display:block;src:url('assets/fonts/plex-mono-400.woff2') format('woff2');}
        @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:600;font-display:block;src:url('assets/fonts/plex-mono-600.woff2') format('woff2');}
        @font-face{font-family:'Newsreader';font-style:normal;font-weight:500;font-display:block;src:url('assets/fonts/newsreader-500.woff2') format('woff2');}
        @font-face{font-family:'Newsreader';font-style:italic;font-weight:500;font-display:block;src:url('assets/fonts/newsreader-500-italic.woff2') format('woff2');}

        /* Root styled by #root (never a class on the root) — scoping law */
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: 'IBM Plex Sans', sans-serif;
        }

        /* Full-bleed ground on its OWN clip layer (never on #root) */
        .ground {
          position: absolute;
          inset: 0;
          background: #0B0D11;
        }

        /* Transparent timed content layer — the ground shows through */
        .stage {
          position: absolute;
          inset: 0;
          background: transparent;
        }

        /* Camera wrapper — the slow climax push-in scales THIS (a child of the clip) */
        .camera {
          position: absolute;
          inset: 0;
          transform-origin: 50% 50%;
          will-change: transform;
        }

        /* Restrained, localized amber bloom behind the dial (no full-screen gradient) */
        .bloom {
          position: absolute;
          left: 550px;
          top: 75px;
          width: 820px;
          height: 820px;
          border-radius: 50%;
          background: radial-gradient(circle,
            rgba(217, 161, 59, 0.13) 0%,
            rgba(217, 161, 59, 0.06) 36%,
            rgba(217, 161, 59, 0) 70%);
        }

        /* ── Identity cluster, upper-center ── */
        .identity {
          position: absolute;
          top: 150px;
          left: 0;
          right: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 22px;
        }
        .id-item {
          transform-origin: 50% 50%;
          will-change: transform;
        }
        .id-logo {
          display: block;
          width: 64px;
          height: 64px;
          object-fit: contain;
        }
        .id-name {
          font-family: 'IBM Plex Sans';
          font-weight: 600;
          font-size: 54px;
          letter-spacing: -0.01em;
          color: #E8EAEE;
          line-height: 1;
        }
        .id-pill {
          font-family: 'IBM Plex Mono';
          font-weight: 600;
          font-size: 24px;
          letter-spacing: 0.04em;
          color: #D9A13B;
          background: rgba(217, 161, 59, 0.10);
          border: 1.5px solid rgba(217, 161, 59, 0.20);
          border-radius: 100px;
          padding: 7px 17px;
          line-height: 1;
        }

        /* ── ScoreDial, centered ~46% ── */
        .dial {
          position: absolute;
          top: 285px;
          left: 0;
          right: 0;
          display: flex;
          justify-content: center;
        }
        .dial-box {
          position: relative;
          width: 400px;
          height: 400px;
        }
        .dial-svg {
          width: 400px;
          height: 400px;
          /* start the stroke at 12 o'clock and sweep clockwise (matches the app) */
          transform: rotate(-90deg);
          transform-origin: 50% 50%;
        }
        .num-wrap {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }
        .num-line {
          height: 162px;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .num-score {
          font-family: 'IBM Plex Mono';
          font-weight: 600;
          font-size: 140px;
          line-height: 1;
          color: #D9A13B;
          font-variant-numeric: tabular-nums;
          letter-spacing: -0.02em;
        }
        .num-sub {
          margin-top: 2px;
          font-family: 'IBM Plex Mono';
          font-weight: 400;
          font-size: 30px;
          color: #5C6470;
          line-height: 1;
          letter-spacing: 0.02em;
        }

        /* ── Verdict block, to the right of the dial ── */
        .verdict {
          position: absolute;
          top: 432px;
          left: 1240px;
          width: 380px;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
        }
        .v-pill {
          font-family: 'IBM Plex Sans';
          font-weight: 600;
          font-size: 30px;
          letter-spacing: -0.005em;
          color: #D9A13B;
          background: rgba(217, 161, 59, 0.07);
          border: 1.5px solid rgba(217, 161, 59, 0.22);
          border-radius: 100px;
          padding: 12px 28px;
          line-height: 1;
          transform-origin: left center;
          will-change: transform;
        }
        .v-conf {
          display: flex;
          align-items: center;
          gap: 12px;
          padding-left: 4px;
        }
        .v-dot {
          width: 11px;
          height: 11px;
          border-radius: 50%;
          background: #D9A13B;
          flex: none;
        }
        .v-conf-label {
          font-family: 'IBM Plex Sans';
          font-weight: 400;
          font-size: 25px;
          color: #9AA3B2;
          line-height: 1;
        }

        /* ── Discrete mono meta, beneath the dial ── */
        .meta {
          position: absolute;
          top: 712px;
          left: 0;
          right: 0;
          text-align: center;
          font-family: 'IBM Plex Mono';
          font-weight: 400;
          font-size: 24px;
          letter-spacing: 0.03em;
          color: #5C6470;
        }

        /* ── The one serif-italic verdict line ── */
        .serif {
          position: absolute;
          top: 780px;
          left: 0;
          right: 0;
          text-align: center;
          font-family: 'Newsreader';
          font-style: italic;
          font-weight: 500;
          font-size: 41px;
          letter-spacing: 0.01em;
          color: #E8EAEE;
          line-height: 1.2;
        }
        .serif .w {
          display: inline-block;
          will-change: transform;
        }
      </style>

      <div id="root" data-composition-id="04-verdict" data-width="1920" data-height="1080">
        <!-- Full-bleed dark ground — its own clip on the lowest track -->
        <div class="ground clip" data-start="0" data-duration="6.5" data-track-index="0"></div>

        <!-- Transparent content stage clip -->
        <div class="stage clip" data-start="0" data-duration="6.5" data-track-index="1">
          <div class="camera" id="v4-camera">
            <div class="bloom" id="v4-bloom"></div>

            <!-- Identity cluster -->
            <div class="identity">
              <img class="id-item id-logo" src="assets/solana-logo.png" alt="Solana" />
              <div class="id-item id-name">Solana</div>
              <div class="id-item id-pill">SOL</div>
            </div>

            <!-- ScoreDial -->
            <div class="dial">
              <div class="dial-box">
                <svg class="dial-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                  <circle id="v4-track" cx="100" cy="100" r="84" fill="none"
                          stroke="rgba(217,161,59,0.10)" stroke-width="12" />
                  <circle id="v4-arc" cx="100" cy="100" r="84" fill="none"
                          stroke="#D9A13B" stroke-width="12" stroke-linecap="round" />
                  <circle id="v4-endcap" r="8" fill="#D9A13B" />
                </svg>
                <div class="num-wrap">
                  <div class="num-line"><span class="num-score" id="v4-numScore">0</span></div>
                  <div class="num-sub" id="v4-numSub">/100</div>
                </div>
              </div>
            </div>

            <!-- Verdict block -->
            <div class="verdict">
              <div class="v-pill" id="v4-vpill">À surveiller</div>
              <div class="v-conf" id="v4-vconf">
                <span class="v-dot"></span>
                <span class="v-conf-label">confiance élevée</span>
              </div>
            </div>

            <!-- Discrete mono meta -->
            <div class="meta" id="v4-meta">avant red flags 67 · −5 pts</div>

            <!-- Serif-italic verdict line (per-word) -->
            <div class="serif" id="v4-serif"><span class="w">Le</span> <span class="w">verdict</span> <span class="w">en</span> <span class="w">un</span> <span class="w">coup</span> <span class="w">d’œil.</span></div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ── ScoreDial geometry (faithful to src/components/ScoreDial.tsx) ──
        const arc = document.getElementById("v4-arc");
        const endcap = document.getElementById("v4-endcap");
        const CIRC = arc.getTotalLength();              // measured, not hard-coded
        const VALUE = 62;
        const FINAL_OFFSET = CIRC * (1 - VALUE / 100);  // 62% swept
        arc.style.strokeDasharray = CIRC;
        arc.style.strokeDashoffset = CIRC;              // start empty

        // place the lit end-cap exactly at the arc tip (local coords, rotates with the svg)
        const tip = arc.getPointAtLength(CIRC * (VALUE / 100));
        endcap.setAttribute("cx", tip.x);
        endcap.setAttribute("cy", tip.y);
        endcap.style.opacity = 0;

        const numScore = document.getElementById("v4-numScore");
        const NUM_START = 140, NUM_END = 152;           // subtle escalating weight

        /* ───────────────── Scene 1 (0.0–1.4s) — identity seats, empty track draws in ───────────────── */
        // restrained amber bloom rises behind the dial
        tl.fromTo("#v4-bloom", { opacity: 0 }, { opacity: 1, duration: 1.0, ease: "power2.out" }, 0.2);

        // identity cluster spring-pops in (smooth long-tail, no overshoot), staggered as one beat
        gsap.utils.toArray(".id-item").forEach((el, i) => {
          tl.fromTo(el,
            { scale: 0, opacity: 0, y: 16 },
            { scale: 1, opacity: 1, y: 0, duration: 0.55, ease: "power3.out" },
            0.15 + i * 0.08);
        });

        // the empty ScoreDial track fades in beneath
        tl.fromTo("#v4-track", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.6);

        /* ───────────────── Scene 2 (1.4–4.3s) — THE CLIMAX: arc self-draws + count-up + push-in ───────────────── */
        // amber arc self-draws 0 → 62 via stroke-dashoffset (GSAP, never CSS)
        tl.fromTo("#v4-arc",
          { strokeDashoffset: CIRC },
          { strokeDashoffset: FINAL_OFFSET, duration: 2.4, ease: "power3.out" },
          1.4);

        // center number counts 0 → 62 with a subtle font-size grow — SAME start/dur/ease so number + arc land as one beat
        const count = { value: 0, fontSize: NUM_START };
        tl.fromTo(count,
          { value: 0, fontSize: NUM_START },
          {
            value: VALUE, fontSize: NUM_END, duration: 2.4, ease: "power3.out",
            onUpdate: () => {
              numScore.textContent = Math.round(count.value);     // Math.round, O(1)
              numScore.style.fontSize = count.fontSize + "px";
            }
          },
          1.4);
        tl.fromTo("#v4-numScore", { opacity: 0 }, { opacity: 1, duration: 0.3, ease: "power2.out" }, 1.4);
        tl.fromTo("#v4-numSub", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, 1.6);

        // slow minimal camera push-in on the dial — settles as the number lands, then HOLDS (no back-half drift)
        tl.fromTo("#v4-camera",
          { scale: 1 },
          { scale: 1.045, duration: 2.5, ease: "power2.inOut" },
          1.4);

        // the lit end-cap fades in as the arc completes
        tl.fromTo("#v4-endcap", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, 3.5);

        /* ───────────────── Scene 3 (4.3–5.5s) — verdict pill + confiance + meta ───────────────── */
        // verdict pill spring-pops to the right, unfolding from the dial side
        tl.fromTo("#v4-vpill",
          { scale: 0, opacity: 0, x: -14 },
          { scale: 1, opacity: 1, x: 0, duration: 0.55, ease: "power3.out" },
          4.3);
        tl.fromTo("#v4-vconf",
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
          4.55);
        // discrete mono meta fades in beneath
        tl.fromTo("#v4-meta",
          { opacity: 0, y: 8 },
          { opacity: 1, y: 0, duration: 0.55, ease: "power2.out" },
          4.7);

        /* ───────────────── Scene 4 (5.5–6.5s) — serif line reveals per-word, then HELD climax ───────────────── */
        gsap.utils.toArray("#v4-serif .w").forEach((el, i) => {
          tl.fromTo(el,
            { opacity: 0, y: 12 },
            { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
            5.5 + i * 0.09);
        });

        // the ONLY aliveness during the hold: the ring end-cap, a subtle finite pulse (sine, low amplitude)
        const pulse = { p: 0 };
        tl.to(pulse,
          {
            p: Math.PI * 2 * 2, duration: 1.0, ease: "none",
            onUpdate: () => {
              // cos(0)=1 → opacity 1.0 at start: no jump from the held end-cap state
              endcap.style.opacity = (0.84 + 0.16 * ((Math.cos(pulse.p) + 1) / 2)).toFixed(3);
            }
          },
          5.5);

        window.__timelines["04-verdict"] = tl;
      </script>
    </template>
  </body>
</html>
